name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - run: cargo test --workspace
      - name: Focusa API contract probe
        run: |
          set -euo pipefail
          cargo run -p focusa-api --release --bin focusa-daemon >/tmp/focusa-daemon.log 2>&1 &
          DAEMON_PID=$!
          cleanup() {
            kill "$DAEMON_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8787/v1/health >/dev/null; then
              break
            fi
            sleep 1
          done

          python3 scripts/api_contract_probe.py --base-url http://127.0.0.1:8787 --out /tmp/focusa_api_spec_audit.json
      - run: cargo clippy --workspace -- -D warnings
